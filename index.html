<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinema Select — 映画ガチャ＆スケジュール</title>
<style>.ic{display:inline-flex;align-items:center;justify-content:center;vertical-align:middle;flex-shrink:0}.ic svg{display:block}</style>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#09090b;--dark:#111115;--surface:#18181e;--card:#1f1f27;--raised:#26262f;
  --gold:#c9a84c;--gold-dim:#6b5520;--gold-pale:#f5e6b8;--gold-glow:rgba(201,168,76,.12);
  --cream:#ede8dc;--muted:#7a7a88;--border:#2a2a35;--text:#ddd8cc;
  --teal:#6ab4c4;--teal-dim:#2d5f6b;--teal-glow:rgba(106,180,196,.1);
  --green:#5ec490;--green-dim:#1e5c3a;
  --plan:#b07ee8;--plan-dim:#4a2d6b;--plan-glow:rgba(176,126,232,.1);
}
body{background:var(--black);font-family:'Jost',sans-serif;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem}

.app{width:100%;max-width:740px}

/* ── HEADER ── */
.hdr{text-align:center;padding:2.5rem 2rem 2rem;position:relative}
.hdr-rule{height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);margin-bottom:1.75rem}
.hdr-eyebrow{font-size:10px;letter-spacing:8px;color:var(--gold);text-transform:uppercase;font-family:'Jost',sans-serif;font-weight:300;margin-bottom:.6rem}
.hdr-title{font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:600;color:var(--cream);letter-spacing:1px;line-height:1.1}
.hdr-title em{font-style:italic;color:var(--gold)}
.hdr-sub{font-size:11px;letter-spacing:3px;color:var(--muted);margin-top:.6rem;font-weight:300}
.hdr-rule-bot{height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);margin-top:1.75rem}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:0;background:var(--dark)}
.tb{flex:1;padding:12px;font-size:10px;letter-spacing:4px;text-transform:uppercase;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;color:var(--muted);transition:all .2s;font-family:'Jost',sans-serif;font-weight:400}
.tb:hover{color:var(--text)}
.tb.at{color:var(--gold);border-bottom-color:var(--gold)}
.tb.atm{color:var(--teal);border-bottom-color:var(--teal)}

/* ── PANELS ── */
.pane{display:none}
.pane.vis{display:block}

/* ── MOOD GRID ── */
.mood-section{padding:1.75rem 1.75rem 1.25rem;background:var(--dark)}
.mood-label{font-size:10px;letter-spacing:5px;color:var(--gold-dim);text-transform:uppercase;text-align:center;margin-bottom:1.25rem;font-weight:300}
.mood-label.mini{color:var(--teal-dim)}
.mood-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(115px,1fr));gap:8px}
.mb{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 8px 12px;cursor:pointer;transition:all .18s;text-align:center;position:relative;overflow:hidden}
.mb::after{content:'';position:absolute;inset:0;background:var(--gold-glow);opacity:0;transition:opacity .18s}
.mb:hover{border-color:var(--gold-dim);transform:translateY(-2px)}
.mb:hover::after{opacity:1}
.mb.ac{border-color:var(--gold);background:var(--card)}
.mb.ac::after{opacity:1}
.mb.mm::after{background:var(--teal-glow)}
.mb.mm:hover{border-color:var(--teal-dim)}
.mb.mm.ac{border-color:var(--teal)}
.mb-icon{margin-bottom:6px;display:flex;justify-content:center;color:var(--text)}
.mb-name{font-size:11px;font-weight:500;color:var(--cream);display:block;margin-bottom:2px;letter-spacing:.5px}
.mb-desc{font-size:9px;color:var(--muted);display:block;letter-spacing:.5px}

/* ── RESULT ── */
.result-wrap{background:var(--dark);padding:0 1.75rem 1.75rem}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin-bottom:1.5rem}

.empty-state{text-align:center;padding:3rem 2rem;color:var(--muted)}
.empty-icon{font-size:40px;opacity:.25;margin-bottom:1rem;display:block}
.empty-text{font-size:12px;letter-spacing:2px;font-weight:300}

/* ── MOVIE CARD ── */
.movie-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;opacity:0;transform:translateY(14px);transition:opacity .4s ease,transform .4s ease}
.movie-card.show{opacity:1;transform:translateY(0)}

.card-banner{background:var(--card);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
.now-showing{font-size:8px;letter-spacing:6px;color:var(--gold);text-transform:uppercase;font-weight:300}
.now-showing.mini{color:var(--teal)}
.badge-row{display:flex;gap:6px;align-items:center}
.genre-badge{font-size:9px;padding:3px 10px;border-radius:20px;border:1px solid var(--gold-dim);color:var(--gold);letter-spacing:1px}
.genre-badge.mini{border-color:var(--teal-dim);color:var(--teal)}
.origin-badge{font-size:9px;padding:2px 8px;border-radius:20px;background:rgba(106,180,196,.08);border:1px solid var(--teal-dim);color:var(--teal);letter-spacing:1px}

.card-body{padding:1.4rem 1.6rem}
.movie-title{font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:600;color:var(--cream);margin-bottom:3px;line-height:1.1}
.movie-title-jp{font-size:11px;color:var(--muted);margin-bottom:1rem;letter-spacing:1px;font-weight:300}
.meta-row{display:flex;gap:16px;margin-bottom:1.1rem;flex-wrap:wrap}
.meta-item{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px}
.meta-dot{width:3px;height:3px;border-radius:50%;background:var(--gold-dim);flex-shrink:0}
.meta-dot.mini{background:var(--teal-dim)}
.meta-val{color:var(--text)}
.section-label{font-size:8px;letter-spacing:5px;text-transform:uppercase;color:var(--gold-dim);margin-bottom:7px;font-weight:300}
.section-label.mini{color:var(--teal-dim)}
.synopsis{font-size:13px;color:var(--text);line-height:1.75;margin-bottom:1.1rem}
.highlight-box{background:var(--card);border-left:2px solid var(--gold-dim);padding:10px 14px;border-radius:0 6px 6px 0}
.highlight-box.mini{border-left-color:var(--teal-dim)}
.highlight-text{font-size:12px;color:var(--text);line-height:1.65}

.card-footer{border-top:1px solid var(--border);padding:12px 1.6rem;display:flex;align-items:center;justify-content:space-between;background:var(--card);gap:8px;flex-wrap:wrap}
.runtime{font-size:11px;color:var(--muted)}
.runtime span{color:var(--gold);font-weight:500}
.runtime span.mini{color:var(--teal)}
.footer-btns{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* ── BUTTONS ── */
.btn{background:transparent;border-radius:20px;padding:6px 16px;font-size:10px;cursor:pointer;letter-spacing:2px;transition:all .2s;font-family:'Jost',sans-serif;font-weight:400;text-decoration:none;display:inline-flex;align-items:center;gap:5px;border:1px solid}
.btn-gold{border-color:var(--gold-dim);color:var(--gold)}
.btn-gold:hover{border-color:var(--gold);background:var(--gold-glow)}
.btn-gold.mini{border-color:var(--teal-dim);color:var(--teal)}
.btn-gold.mini:hover{border-color:var(--teal);background:var(--teal-glow)}
.btn-green{border-color:var(--green-dim);color:var(--green)}
.btn-green:hover{border-color:var(--green);background:rgba(94,196,144,.08)}
.btn-plan{border-color:var(--plan-dim);color:var(--plan)}
.btn-plan:hover{border-color:var(--plan);background:var(--plan-glow)}

.jw-note{font-size:10px;color:var(--muted);text-align:center;padding:6px 1.6rem 0;line-height:1.6}

/* ── PLAN SECTION ── */
.plan-section{background:var(--dark);padding:0 1.75rem 1.75rem;overflow:hidden;max-height:0;transition:max-height .5s ease,opacity .4s ease;opacity:0}
.plan-section.open{max-height:2000px;opacity:1}

.plan-header{display:flex;align-items:center;gap:10px;padding:1.4rem 0 1.2rem;border-top:1px solid var(--border)}
.plan-header-icon{width:32px;height:32px;border-radius:8px;background:var(--plan-glow);border:1px solid var(--plan-dim);display:flex;align-items:center;justify-content:center;color:var(--plan);font-size:16px;flex-shrink:0}
.plan-header-text{flex:1}
.plan-title{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:600;color:var(--cream)}
.plan-sub{font-size:10px;color:var(--muted);letter-spacing:1px;font-weight:300}

.plan-movie-name{font-size:12px;color:var(--plan);letter-spacing:1px;font-weight:400;margin-bottom:1rem;padding:8px 12px;background:var(--plan-glow);border:1px solid var(--plan-dim);border-radius:6px;display:flex;align-items:center;gap:8px}

/* start time row */
.start-row{display:flex;gap:10px;align-items:flex-end;margin-bottom:1.25rem;flex-wrap:wrap}
.input-group{display:flex;flex-direction:column;gap:5px}
.input-label{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--muted);font-weight:300}
.time-input{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:14px;color:var(--cream);font-family:'Jost',sans-serif;width:110px;transition:border-color .2s}
.time-input:focus{outline:none;border-color:var(--plan-dim)}
.time-input:hover{border-color:var(--border)}

/* timeline */
.timeline{display:flex;flex-direction:column;gap:0}
.tl-item{display:flex;gap:0;position:relative}
.tl-left{width:56px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding-top:4px}
.tl-time{font-size:11px;color:var(--plan);font-weight:500;letter-spacing:.5px;white-space:nowrap}
.tl-line{width:1px;background:var(--plan-dim);flex:1;margin-top:4px;min-height:20px}
.tl-dot{width:8px;height:8px;border-radius:50%;border:2px solid var(--plan);background:var(--black);flex-shrink:0;margin-top:6px}
.tl-dot.end{border-color:var(--gold);background:var(--black)}
.tl-content{flex:1;padding-bottom:16px;padding-left:12px}
.tl-card{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color .2s}
.tl-card:hover{border-color:var(--plan-dim)}
.tl-card-head{background:var(--raised);padding:8px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.tl-card-num{font-size:8px;letter-spacing:4px;color:var(--plan);text-transform:uppercase;font-weight:300}
.tl-card-genre{font-size:9px;padding:2px 8px;border-radius:10px;border:1px solid var(--plan-dim);color:var(--plan)}
.tl-card-body{padding:10px 12px}
.tl-movie-title{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:600;color:var(--cream);margin-bottom:2px}
.tl-movie-jp{font-size:10px;color:var(--muted);margin-bottom:6px;letter-spacing:.5px}
.tl-duration-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:6px}
.tl-duration-fill{height:100%;background:linear-gradient(90deg,var(--plan-dim),var(--plan));border-radius:2px;transition:width .6s ease}
.tl-time-range{font-size:11px;color:var(--muted);display:flex;gap:8px;align-items:center}
.tl-time-val{color:var(--text);font-weight:500}
.tl-arrow{color:var(--muted);font-size:10px}

/* break item */
.tl-break{background:var(--surface);border:1px dashed var(--border);border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:8px}
.tl-break-icon{color:var(--muted);font-size:14px}
.tl-break-text{font-size:11px;color:var(--muted)}
.tl-break-min{color:var(--text);font-weight:500}

/* end node */
.tl-end{display:flex;gap:0}
.tl-end-left{width:56px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding-top:4px}
.tl-end-time{font-size:12px;color:var(--gold);font-weight:500}
.tl-end-dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--gold);background:var(--gold);margin-top:5px}
.tl-end-content{flex:1;padding-left:12px;padding-top:3px}
.tl-end-label{font-size:10px;letter-spacing:3px;color:var(--gold-dim);text-transform:uppercase;font-weight:300}

/* add next row */
.add-next-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-top:1.25rem;padding-top:1.25rem;border-top:1px solid var(--border)}
.break-input{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:14px;color:var(--cream);font-family:'Jost',sans-serif;width:80px;transition:border-color .2s}
.break-input:focus{outline:none;border-color:var(--plan-dim)}
.break-input:hover{border-color:var(--border)}
.add-note{font-size:10px;color:var(--muted);margin-top:8px;line-height:1.6}

/* summary bar */
.summary-bar{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-top:1.25rem;display:flex;gap:16px;flex-wrap:wrap;align-items:center}
.summary-item{display:flex;flex-direction:column;gap:2px}
.summary-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);font-weight:300}
.summary-val{font-size:16px;font-weight:500;color:var(--cream);font-family:'Cormorant Garamond',serif}
.summary-val span{font-size:11px;color:var(--muted);font-family:'Jost',sans-serif;font-weight:300;margin-left:2px}
.summary-divider{width:1px;height:36px;background:var(--border)}

/* film strip */
.film-strip{display:flex;justify-content:center;gap:6px;padding:1rem;background:var(--dark);border-top:1px solid var(--border)}
.fh{width:16px;height:10px;border:1px solid var(--border);border-radius:2px;opacity:.3}

@media(max-width:500px){
  .mood-grid{grid-template-columns:repeat(2,1fr)}
  .hdr-title{font-size:1.8rem}
  .start-row,.add-next-row{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>
<div class="app">

  <div class="hdr">
    <div class="hdr-rule"></div>
    <div class="hdr-eyebrow">Cinema Select</div>
    <div class="hdr-title">映画ガチャ <em>&</em> スケジューラー</div>
    <div class="hdr-sub">Your mood · Your movie · Your plan</div>
    <div class="hdr-rule-bot"></div>
  </div>

  <div class="tabs">
    <button class="tb at" id="t1" onclick="sw('main')">メインスクリーン</button>
    <button class="tb" id="t2" onclick="sw('mini')">ミニシアター</button>
  </div>

  <!-- MAIN PANE -->
  <div id="p1" class="pane vis">
    <div class="mood-section">
      <div class="mood-label">— 今の気分は？ —</div>
      <div class="mood-grid" id="g1"></div>
    </div>
    <div class="result-wrap">
      <div class="divider"></div>
      <div id="r1">
        <div class="empty-state">
          <span class="empty-icon"><span class="ic"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M7 4v16M17 4v16M2 12h20M2 8h5M2 16h5M17 8h5M17 16h5"/></svg></span></span>
          <div class="empty-text">気分ボタンを押して映画をガチャしよう</div>
        </div>
      </div>
    </div>
    <div class="plan-section" id="plan1"></div>
  </div>

  <!-- MINI PANE -->
  <div id="p2" class="pane">
    <div class="mood-section">
      <div class="mood-label mini">— ミニシアターの世界へ —</div>
      <div class="mood-grid" id="g2"></div>
    </div>
    <div class="result-wrap">
      <div class="divider"></div>
      <div id="r2">
        <div class="empty-state">
          <span class="empty-icon"><span class="ic"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M5 21V7l7-4 7 4v14"/><path d="M9 21v-4h6v4"/><rect x="9" y="10" width="2" height="2"/><rect x="13" y="10" width="2" height="2"/></svg></span></span>
          <div class="empty-text">カテゴリを選んで出会いを待とう</div>
        </div>
      </div>
    </div>
    <div class="plan-section" id="plan2"></div>
  </div>

  <div class="film-strip">
    <div class="fh"></div><div class="fh"></div><div class="fh"></div><div class="fh"></div>
    <div class="fh"></div><div class="fh"></div><div class="fh"></div><div class="fh"></div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────
const MM=[
  {id:'cry',n:'泣きたい',d:'感動・ドラマ',i:'ti-droplet'},
  {id:'laugh',n:'笑いたい',d:'コメディ・爽快',i:'ti-mood-happy'},
  {id:'thrill',n:'ハラハラしたい',d:'サスペンス・アクション',i:'ti-bolt'},
  {id:'relax',n:'頭を空っぽに',d:'癒し・ほのぼの',i:'ti-cloud'},
  {id:'wonder',n:'異世界に行きたい',d:'ファンタジー・SF',i:'ti-planet'},
  {id:'think',n:'じっくり考えたい',d:'社会派・哲学',i:'ti-brain'},
];
const MN=[
  {id:'europe',n:'ヨーロッパ',d:'仏・伊・北欧ほか',i:'ti-building-arch'},
  {id:'asia',n:'アジア',d:'台湾・韓国・イランほか',i:'ti-ripple'},
  {id:'indie',n:'アメリカ インディーズ',d:'サンダンス系ほか',i:'ti-guitar-pick'},
  {id:'quiet',n:'静かな映画',d:'台詞少なめ・余白の美',i:'ti-wind'},
  {id:'mypick',n:'作者おすすめ',d:'とっておきの一本',i:'ti-heart'},
];

// runtime in minutes for calculations
const DB={
  cry:[
    {t:'The Green Mile',j:'グリーンマイル',y:1999,r:'189分',min:189,dir:'フランク・ダラボン',g:'感動ドラマ',o:'',s:'死刑囚監房を舞台に、不思議な癒しの力を持つ大男ジョン・コーヒーと看守トムの友情を描く。スティーヴン・キング原作の名作。',h:'見どころ：マイケル・クラーク・ダンカンの圧倒的演技と、ラストの切なさは必ずあなたの涙腺を崩壊させる。'},
    {t:'Coco',j:'リメンバー・ミー',y:2017,r:'105分',min:105,dir:'リー・アンクリッチ',g:'アニメ・感動',o:'',s:'音楽を愛する少年ミゲルが死者の国へ迷い込み、先祖たちと出会いながら家族の絆を再発見する物語。ピクサーの傑作。',h:'見どころ：「リメンバー・ミー」の歌声が流れるクライマックスで感情が一気に溢れ出す。'},
    {t:'Grave of the Fireflies',j:'火垂るの墓',y:1988,r:'89分',min:89,dir:'高畑勲',g:'戦争・ドラマ',o:'',s:'戦時下の日本を生き抜こうとする兄と妹の物語。スタジオジブリが放った、二度と忘れられない反戦映画の最高傑作。',h:'見どころ：日常の小さな幸せと喪失が積み重なる構成。節子が飴を食べるシーンに誰もが涙する。'},
    {t:'A Monster Calls',j:'怪物はささやく',y:2016,r:'108分',min:108,dir:'J・A・バヨナ',g:'ファンタジー・感動',o:'',s:'病気の母を持つ少年のもとを怪物が訪れ、3つの物語を語る。悲しみと向き合う心の旅を幻想的に描いた作品。',h:'見どころ：ウォーターカラーアニメが挿入される独特の演出と、ラストの「本当の告白」が心を震わせる。'},
  ],
  laugh:[

// ── STATE ─────────────────────────────────────────────
const state = { main: { movie: null, schedule: [] }, mini: { movie: null, schedule: [] } };

// ── HELPERS ───────────────────────────────────────────
function addMinutes(timeStr, mins) {
  const [h, m] = timeStr.split(':').map(Number);
  const total = h * 60 + m + mins;
  const nh = Math.floor(total / 60) % 24;
  const nm = total % 60;
  return `${String(nh).padStart(2,'0')}:${String(nm).padStart(2,'0')}`;
}
function parseTime(timeStr) {
  const [h, m] = timeStr.split(':').map(Number);
  return h * 60 + m;
}
function totalMins(schedule) {
  return schedule.reduce((a, item) => a + (item.type === 'movie' ? item.movie.min : item.break), 0);
}

// ── TABS ──────────────────────────────────────────────
function sw(tab) {
  document.getElementById('p1').classList.toggle('vis', tab==='main');
  document.getElementById('p2').classList.toggle('vis', tab==='mini');
  document.getElementById('t1').className = 'tb' + (tab==='main' ? ' at' : '');
  document.getElementById('t2').className = 'tb' + (tab==='mini' ? ' atm' : '');
}

// ── RENDER MOODS ──────────────────────────────────────
function renderAll() {
  document.getElementById('g1').innerHTML = MM.map(m =>
    `<button class="mb" onclick="pick('${m.id}','main',this)"><span class="mb-icon">${ic(m.i)}</span><span class="mb-name">${m.n}</span><span class="mb-desc">${m.d}</span></button>`
  ).join('');
  document.getElementById('g2').innerHTML = MN.map(m =>
    `<button class="mb mm" onclick="pick('${m.id}','mini',this)"><span class="mb-icon">${ic(m.i)}</span><span class="mb-name">${m.n}</span><span class="mb-desc">${m.d}</span></button>`
  ).join('');
}

          </button>
          <a class="btn btn-green" href="${url}" target="_blank" rel="noopener">
            <span class="ic"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M8 21h8M12 19v2"/></svg></span>どこで見る？
          </a>
          <button class="btn btn-gold ${mc}" onclick="pick('${id}','${mode}',document.querySelector('#${gid} .mb.ac'))">もう一本 ↺</button>
        </div>
      </div>
    </div>
    <div class="jw-note">「どこで見る？」はJustWatch（外部サイト）に移動します。</div>
  `;
  requestAnimationFrame(() => requestAnimationFrame(() => {
    const c = document.getElementById('mc_' + mode);
    if (c) c.classList.add('show');
  }));
}

// ── OPEN PLAN ─────────────────────────────────────────
function openPlan(mode) {
  const movie = state[mode].movie;
  if (!movie) return;
  state[mode].schedule = [];
  const pid = mode==='main' ? 'plan1' : 'plan2';
  const el = document.getElementById(pid);
  el.innerHTML = renderPlanShell(mode, movie);
  el.classList.add('open');
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function renderPlanShell(mode, movie) {
  return `
    <div class="plan-header">
      <div class="plan-header-icon"><span class="ic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M16 3v4M8 3v4M4 11h16"/><rect x="8" y="15" width="2" height="2"/></svg></span></div>
      <div class="plan-header-text">
        <div class="plan-title">鑑賞スケジューラー</div>
        <div class="plan-sub">上映時間をもとに自動でタイムラインを計算します</div>
      </div>
    </div>
    <div class="plan-movie-name">
      <span class="ic"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M7 4v16M17 4v16M2 12h20M2 8h5M2 16h5M17 8h5M17 16h5"/></svg></span>
      ${movie.t} — ${movie.r}
    </div>
    <div class="start-row">
      <div class="input-group">
        <div class="input-label">1本目の開始時間</div>
        <input class="time-input" type="time" id="startTime_${mode}" value="13:00">
      </div>
      <button class="btn btn-plan" onclick="buildTimeline('${mode}')">
        <span class="ic"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4l12 8-12 8V4z"/></svg></span>タイムラインを作成
      </button>
    </div>
    <div id="timeline_${mode}"></div>
  `;
}

// ── BUILD TIMELINE ────────────────────────────────────
function buildTimeline(mode) {
  const movie = state[mode].movie;
  const startInput = document.getElementById('startTime_' + mode);
  if (!startInput) return;
  const startTime = startInput.value || '13:00';
  state[mode].schedule = [{ type: 'movie', movie, startTime, endTime: addMinutes(startTime, movie.min) }];
  renderTimeline(mode);
}

function addNextMovie(mode) {
  const breakInput = document.getElementById('breakMin_' + mode);
  const breakMins = parseInt(breakInput ? breakInput.value : '0') || 0;
  const last = state[mode].schedule[state[mode].schedule.length - 1];
  const breakStart = last.endTime;
  const nextStart = addMinutes(breakStart, breakMins);

  // pick a random movie different from current last
  const allMovies = Object.values(DB).flat();
  const filtered = allMovies.filter(m => m.t !== last.movie.t);
  const next = filtered[Math.floor(Math.random() * filtered.length)];

  if (breakMins > 0) {
    state[mode].schedule.push({ type: 'break', break: breakMins, startTime: breakStart, endTime: nextStart });
  }
  state[mode].schedule.push({ type: 'movie', movie: next, startTime: nextStart, endTime: addMinutes(nextStart, next.min) });
  renderTimeline(mode);
}

function renderTimeline(mode) {
  const schedule = state[mode].schedule;
  if (!schedule.length) return;
  const tid = 'timeline_' + mode;
  const el = document.getElementById(tid);
  if (!el) return;

  const totalMin = totalMins(schedule);
  const movieCount = schedule.filter(s => s.type === 'movie').length;
  const endTime = schedule[schedule.length - 1].endTime;
  const maxMin = Math.max(...schedule.filter(s => s.type === 'movie').map(s => s.movie.min));

  let html = `<div class="timeline">`;
  let movieIdx = 0;
  schedule.forEach((item, i) => {
    if (item.type === 'movie') {
      movieIdx++;
      const barW = Math.round((item.movie.min / maxMin) * 100);
      html += `
        <div class="tl-item">
          <div class="tl-left">
            <div class="tl-time">${item.startTime}</div>
            <div class="tl-dot"></div>
            <div class="tl-line"></div>
          </div>
          <div class="tl-content">
            <div class="tl-card">
              <div class="tl-card-head">
                <span class="tl-card-num">${movieIdx}本目</span>
                <span class="tl-card-genre">${item.movie.g}</span>
              </div>
              <div class="tl-card-body">
                <div class="tl-movie-title">${item.movie.t}</div>
                <div class="tl-movie-jp">${item.movie.j}（${item.movie.y}）</div>
                <div class="tl-duration-bar"><div class="tl-duration-fill" style="width:${barW}%"></div></div>
                <div class="tl-time-range">
                  <span class="tl-time-val">${item.startTime}</span>
                  <span class="tl-arrow">→</span>
                  <span class="tl-time-val">${item.endTime}</span>
                  <span style="margin-left:4px;font-size:10px;color:var(--muted)">${item.movie.r}</span>
                </div>
              </div>
            </div>
          </div>
        </div>`;
    } else {
      html += `
        <div class="tl-item">
          <div class="tl-left">
            <div class="tl-time">${item.startTime}</div>
            <div class="tl-dot" style="border-color:var(--muted)"></div>
            <div class="tl-line" style="background:var(--border)"></div>
          </div>
          <div class="tl-content">
            <div class="tl-break">
              <span class="ic"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 14c0 2.8 2.2 5 5 5h4c2.8 0 5-2.2 5-5V8H3v6z"/><path d="M17 9h1a3 3 0 0 1 0 6h-1"/></svg></span>
              <span class="tl-break-text">移動・休憩 <span class="tl-break-min">${item.break}分</span>（${item.startTime} → ${item.endTime}）</span>
            </div>
          </div>
        </div>`;
    }
  });

  // end node
  html += `
    <div class="tl-end">
      <div class="tl-end-left">
        <div class="tl-end-time">${endTime}</div>
        <div class="tl-end-dot"></div>
      </div>
      <div class="tl-end-content">
        <div class="tl-end-label">終了</div>
      </div>
    </div>
  </div>`;

  // summary
  const totalH = Math.floor(totalMin / 60);
  const totalM = totalMin % 60;
  html += `
    <div class="summary-bar">
      <div class="summary-item">
        <div class="summary-label">鑑賞本数</div>
        <div class="summary-val">${movieCount}<span>本</span></div>
      </div>
      <div class="summary-divider"></div>
      <div class="summary-item">
        <div class="summary-label">合計時間</div>
        <div class="summary-val">${totalH > 0 ? totalH + '<span>時間</span>' : ''}${totalM}<span>分</span></div>
      </div>
      <div class="summary-divider"></div>
      <div class="summary-item">
        <div class="summary-label">終了時刻</div>
        <div class="summary-val">${endTime}</div>
      </div>
    </div>`;

  // add next row
  html += `
    <div class="add-next-row">
      <div class="input-group">
        <div class="input-label">移動・休憩時間（分）</div>
        <input class="break-input" type="number" id="breakMin_${mode}" min="0" max="300" value="30" placeholder="30">
      </div>
      <button class="btn btn-plan" onclick="addNextMovie('${mode}')">
        <span class="ic"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg></span>2本目を追加
      </button>
    </div>
    <div class="add-note">※ランダムな映画が追加されます。特定の映画を選ぶには、上のガチャで引き直してください。</div>
  `;

  el.innerHTML = html;

  // animate bars
  requestAnimationFrame(() => requestAnimationFrame(() => {
    el.querySelectorAll('.tl-duration-fill').forEach(b => {
      const w = b.style.width;
      b.style.width = '0';
      setTimeout(() => { b.style.width = w; }, 100);
    });
  }));
}

// ── INIT ──────────────────────────────────────────────
renderAll();
</script>
</body>
</html>
